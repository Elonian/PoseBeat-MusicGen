  pretrained_model_dir: /mntdatalora/src/PoseBeat-MusicGen/data/aistpp_legacy/data_and_model/model/all_01
  from_pretrained_model_dir: null
  train_motion_pickle: /mntdatalora/src/PoseBeat-MusicGen/data/aistpp_legacy/data_and_model/conditions/normalized_all_train_data_01.pkl
  test_motion_pickle: /mntdatalora/src/PoseBeat-MusicGen/data/aistpp_legacy/data_and_model/conditions/normalized_all_test_data_01.pkl
  train_audio_dir: /mntdatalora/src/PoseBeat-MusicGen/data/aistpp_legacy/train/wavs_sliced
