paths:
  audio_generator_checkpoint_dir: /mntdatalora/src/PoseBeat-MusicGen/cache_weights/music_generator
  train_motion_pickle: /mntdatalora/src/PoseBeat-MusicGen/data/data_and_model/conditions/normalized_all_train_data_01.pkl
  test_motion_pickle: /mntdatalora/src/PoseBeat-MusicGen/data/data_and_model/conditions/normalized_all_test_data_01.pkl
  train_audio_dir: /mntdatalora/src/PoseBeat-MusicGen/data/train/wavs_sliced
  test_audio_dir: /mntdatalora/src/PoseBeat-MusicGen/data/test/wavs_sliced
  train_latent_dir: /mntdatalora/src/PoseBeat-MusicGen/data/audio_latents/train
  test_latent_dir: /mntdatalora/src/PoseBeat-MusicGen/data/audio_latents/test
  output_dir: /mntdatalora/src/PoseBeat-MusicGen/outputs/motion_audio_adapter

audio:
  audio_length_seconds: 5.0

model:
  motion_dim: 0
  hidden_dim: 512
  num_layers: 4
  num_heads: 8
  dropout: 0.1
  max_motion_frames: 256
  primary_cross_attention_dim: 768
  secondary_cross_attention_dim: 1024

training:
  batch_size: 4
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.01
  gradient_clip: 1.0
  num_workers: 2
  save_every_steps: 1000
  strict_latent_cache: false

logging:
  log_every_steps: 25
  tensorboard: true
