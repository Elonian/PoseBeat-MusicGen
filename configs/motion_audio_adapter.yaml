  normalized_audio_dir: /mntdatalora/src/PoseBeat-MusicGen/outputs/motion_music/normalized

data:
  dataset_split: train
  strict_condition_match: true

audio:
  x_res: 256
  y_res: 256
  sample_rate: 22050
  hop_length: 512
  n_fft: 2048
  top_db: 80
  n_iter: 32

model:
  image_channels: 1
  motion_frames: 150
  motion_dim: 370

training:
  batch_size: 8
  epochs: 100
  learning_rate: 0.0001
  adam_beta1: 0.95
  adam_beta2: 0.999
  adam_epsilon: 0.00000001
  weight_decay: 0.000001
  gradient_clip: 1.0
  num_workers: 2
  scheduler: ddim
  num_train_steps: 1000
  lr_scheduler: cosine
  lr_warmup_steps: 500
  use_ema: true
  ema_inv_gamma: 1.0
  ema_power: 0.75
  ema_max_decay: 0.9999
  save_every_steps: 1000
  save_every_epochs: 10
  max_train_samples: null

inference:
  seed: 2391504374279719
  eta: 0.0

logging:
  log_every_steps: 25
  tensorboard: true
